<!DOCTYPE html><html><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Operation: Elli Ultimate</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:white;margin:0}
.wrap{max-width:850px;margin:30px auto;padding:20px}.card{background:#1e293b;padding:25px;border-radius:20px;text-align:center}
button{padding:12px 18px;margin:8px;border:none;border-radius:12px;background:#ec4899;color:white;font-weight:bold}
img{max-width:100%;border-radius:12px}.bar{height:8px;background:#333}.fill{height:8px;background:#8b5cf6;width:0%}
</style></head><body>
<div class='bar'><div id='fill' class='fill'></div></div>
<audio id='music' loop><source src='music.mp3' type='audio/mpeg'></audio>
<div class='wrap'><div id='app' class='card'></div></div>
<div id='pop' style='display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);align-items:center;justify-content:center'>
<div class='card' id='popc'></div></div>
<script>
const G={
rizz:"https://media1.tenor.com/m/7HdRz8jCFVoAAAAd/dob-dob-dob-rizz.gif",
poop:"https://media1.tenor.com/m/rHb2ijF_nt0AAAAC/call-of-doodoo-advanced-poo-poo.gif",
zyzz:"https://media1.tenor.com/m/TsNQm6dVq0MAAAAd/zyzz-glasses-zyzz.gif",
grat:"https://media.tenor.com/FkrIfYoakDwAAAAi/thanking-gratitude.gif",
caseoh:"https://media1.tenor.com/m/PYeZeMhYu8AAAAAd/caseoh-case.gif",
cry:"https://media1.tenor.com/m/wknZD3HfmWIAAAAC/cry.gif",
identity:"https://media1.tenor.com/m/B8ra2i-OK9QAAAAd/face-recognition.gif",
confused:"https://media1.tenor.com/m/R7tRhSEXLLAAAAAd/idk-rock1.gif",
fbi:"https://media1.tenor.com/m/BuUbqBxHEPUAAAAd/james-doakes-james.gif",
norizz:"https://media1.tenor.com/m/Zu0eXWpX8qsAAAAd/mindy-angry-mindy.gif",
danger:"https://media1.tenor.com/m/9Baue_rQfBcAAAAd/period.gif",
awin:"https://media1.tenor.com/m/bWkE0Y8JaBgAAAAC/dragon-ball-super-saiyan.gif",
gwin:"https://media1.tenor.com/m/RivFq3cEeEwAAAAC/eating-gorilla.gif",
help:"https://media1.tenor.com/m/UlEihqD11CoAAAAd/cat-kiss.gif",
laugh:"https://media1.tenor.com/m/xayHMPdWnmIAAAAC/cat-attack-attitude.gif",
record:"https://media1.tenor.com/m/6Noh04TN-gIAAAAC/prempdr-fc-mobile.gif",
elli:"https://media1.tenor.com/m/psDvH46tqbsAAAAd/fortnite-black-knight.gif",
maybe:"https://media1.tenor.com/m/S8FsdEh6C8kAAAAd/nathan-fielder-nathan-for-you.gif",
hug:"https://media1.tenor.com/m/kzSsY9IxkisAAAAC/npc-behavior-be-like.gif",
cat:"https://media1.tenor.com/m/_hUq1BSUsiMAAAAC/cat-cute.gif",
final:"https://media1.tenor.com/m/rGMQZtqfK7wAAAAC/dance-swag.gif",
fire:"https://media1.tenor.com/m/mPV5imQtw5UAAAAd/firework-car.gif"
};
let s=0;
const screens=[
["Operation: Elli","<p>Start mission for Elli</p><button onclick='start()'>Start Music</button>"],
["Identity Verification","<button onclick=\"gif(G.identity)\">Definitely Elli</button><button onclick=\"gif(G.confused)\">Maybe</button><button onclick=\"gif(G.fbi)\">Depends who's asking</button>"],
["How bad does Adil stink?","<button onclick=\"gif(G.rizz)\">Smells beautiful</button><button onclick=\"gif(G.poop)\">Stinks like poop</button>"],
["How chonky is Adil?","<button onclick=\"doubleGif(G.zyzz,G.grat)\">Zyzz</button><button onclick=\"doubleGif(G.caseoh,G.cry)\">CaseOh</button>"],
["How much rizz does Adil possess?","<button onclick=\"gif(G.norizz)\">No rizz</button><button onclick=\"gif(G.rizz)\">Some rizz</button><button onclick=\"gif(G.danger)\">Dangerous levels</button>"],
["Adil vs 100 Gorillas","<button onclick=\"gif(G.awin)\">Adil wins</button><button onclick=\"gif(G.gwin)\">100 Gorillas win</button>"],
["Adil trips in public...","<button onclick=\"gif(G.help)\">Help immediately</button><button onclick=\"gif(G.laugh)\">Laugh then help</button><button onclick=\"gif(G.record)\">Record it first</button>"],
["Rate Elli","<button onclick=\"gif(G.elli)\">10/10</button><button onclick=\"gif(G.elli)\">11/10</button><button onclick=\"gif(G.elli)\">12/10</button>"],
["Message Adil?","<button onclick=\"gif(G.cat)\">Yes</button><button onclick=\"gif(G.maybe)\">Maybe</button><button onclick=\"gif(G.hug)\">No</button>"],
["Final Message","<img src='"+G.final+"' onclick='secret()'><p>Elli, even though you are a stinker, you are a sweetie du and I'm always on your side ❤️</p>"]
];
function render(){fill.style.width=(s/(screens.length-1))*100+'%';app.innerHTML='<h2>'+screens[s][0]+'</h2>'+screens[s][1]+(s>0&&s<screens.length-1?"<br><br><button onclick=next()>Skip</button>":"");}
function start(){music.play().catch(()=>{});next();}
function next(){if(s<screens.length-1)s++;render();pop.style.display='none';}
function gif(u){pop.style.display='flex';popc.innerHTML='<img src="'+u+'"><br><br><button onclick="next()">Continue</button>';}
function doubleGif(a,b){pop.style.display='flex';popc.innerHTML='<img src="'+a+'"><br><img src="'+b+'"><br><button onclick="next()">Continue</button>';}
let c=0;function secret(){c++;if(c>=5){pop.style.display='flex';popc.innerHTML='<img src="'+G.fire+'"><h2>Secret Ending Unlocked</h2><button onclick="pop.style.display=\'none\'">Awesome</button>';}};
render();
</script></body></html>
