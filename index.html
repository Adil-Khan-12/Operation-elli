<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎮 Operation: Elli Ultimate Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#ec4899;--purple:#8b5cf6;--cyan:#22d3ee;}
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,sans-serif;color:#fff;background:linear-gradient(135deg,#020617,#0f172a,#1e293b);overflow-x:hidden}
#particles{position:fixed;inset:0;pointer-events:none}
.p{position:absolute;opacity:.25;animation:float linear infinite}
@keyframes float{from{transform:translateY(105vh)}to{transform:translateY(-10vh)}}
.progress{position:fixed;top:0;left:0;width:100%;height:8px;background:#111;z-index:100}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan));transition:.6s}
.wrap{max-width:950px;margin:40px auto;padding:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.15);border-radius:28px;padding:30px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.35)}
h1,h2{margin-top:0}
.btn{padding:14px 22px;margin:8px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-weight:700;cursor:pointer}
.btn:hover{transform:translateY(-2px)}
img{max-width:100%;border-radius:18px}
#achievement{position:fixed;right:20px;top:20px;background:#fbbf24;color:#111;padding:12px 16px;border-radius:14px;display:none;font-weight:700;z-index:200}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);align-items:center;justify-content:center;padding:20px;z-index:150}
.small{opacity:.8}
.type{min-height:80px}
</style>
</head>
<body>
<div id="particles"></div>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="achievement"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="wrap"><div class="card" id="app"></div></div>
<div id="overlay"><div class="card" id="overlayCard"></div></div>

<script>
const GIF={
rizz:"https://media1.tenor.com/m/7HdRz8jCFVoAAAAd/dob-dob-dob-rizz.gif",
poop:"https://media1.tenor.com/m/rHb2ijF_nt0AAAAC/call-of-doodoo-advanced-poo-poo.gif",
zyzz:"https://media1.tenor.com/m/TsNQm6dVq0MAAAAd/zyzz-glasses-zyzz.gif",
grat:"https://media.tenor.com/FkrIfYoakDwAAAAi/thanking-gratitude.gif",
caseoh:"https://media1.tenor.com/m/PYeZeMhYu8AAAAAd/caseoh-case.gif",
cry:"https://media1.tenor.com/m/wknZD3HfmWIAAAAC/cry.gif",
cat:"https://media1.tenor.com/m/_hUq1BSUsiMAAAAC/cat-cute.gif",
movie:"https://media1.tenor.com/m/rGMQZtqfK7wAAAAC/dance-swag.gif"
};

for(let i=0;i<50;i++){
 const d=document.createElement('div');
 d.className='p'; d.innerHTML=Math.random()>.5?'❤':'✦';
 d.style.left=Math.random()*100+'vw';
 d.style.animationDuration=(8+Math.random()*12)+'s';
 d.style.fontSize=(12+Math.random()*18)+'px';
 document.getElementById('particles').appendChild(d);
}

const screens=[
()=>`<h1>🎮 Operation: Elli</h1><div class="type" id="boot"></div><button class="btn" onclick="begin()">🎵 Start Music & Begin Mission</button>`,
()=>`<h2>🕵️ Identity Verification</h2>
<button class="btn" onclick="gif('https://media1.tenor.com/m/B8ra2i-OK9QAAAAd/face-recognition.gif','Identity confirmed.','Identity Confirmed')">Definitely Elli</button>
<button class="btn" onclick="gif('https://media1.tenor.com/m/R7tRhSEXLLAAAAAd/idk-rock1.gif','Verification complicated.')">Maybe</button>
<button class="btn" onclick="gif('https://media1.tenor.com/m/BuUbqBxHEPUAAAAd/james-doakes-james.gif','Proceed with caution.')">Depends who is asking</button>`,
()=>`<h2>💨 Smell Analysis</h2><button class="btn" onclick="gif(GIF.rizz,'Science agrees.')">Smells Beautiful</button><button class="btn" onclick="gif(GIF.poop,'Laboratory devastated.')">Stinks Like Poop</button>`,
()=>`<h2>💪 Chonk Analysis</h2><button class="btn" onclick="dual(GIF.zyzz,GIF.grat)">Zyzz</button><button class="btn" onclick="dual(GIF.caseoh,GIF.cry)">CaseOh</button>`,
()=>`<h2>😎 Rizz Meter</h2><button class="btn" onclick="next()">No Rizz</button><button class="btn" onclick="next()">Some Rizz</button><button class="btn" onclick="ach('Dangerous Rizz Detected');next()">Dangerous Levels</button>`,
()=>`<h2>🦍 Adil vs 100 Gorillas</h2><p>Running combat simulation...</p><button class="btn" onclick="gif('https://media1.tenor.com/m/bWkE0Y8JaBgAAAAC/dragon-ball-super-saiyan.gif','Scientists are investigating.','Professional Gorilla Analyst')">Adil</button><button class="btn" onclick="gif('https://media1.tenor.com/m/RivFq3cEeEwAAAAC/eating-gorilla.gif','A realistic outcome has been selected.')">100 Gorillas</button>`,
()=>`<h2>😂 Public Disaster Scenario</h2><p>Adil trips in public. What do you do?</p><button class="btn" onclick="next()">Help Immediately</button><button class="btn" onclick="next()">Laugh Then Help</button><button class="btn" onclick="next()">Record It First</button>`,
()=>`<h2>⭐ Rate Elli</h2><button class="btn" onclick="ach('Elli Rated Beyond Scale');next()">10/10</button><button class="btn" onclick="ach('Elli Rated Beyond Scale');next()">11/10</button><button class="btn" onclick="ach('Elli Rated Beyond Scale');next()">12/10</button>`,
()=>`<h2>📄 Final Report</h2><p>Humour: Elite</p><p>Vibes: Elite</p><p>Elli: Elite</p><p>Conclusion: Adil enjoys talking to Elli ❤️</p><button class="btn" onclick="next()">Continue</button>`,
()=>`<h2>💬 Final Question</h2><p>Would you consider sending Adil a message?</p><button class="btn" onclick="gif(GIF.cat,'YAY ❤️')">Yes</button><button class="btn" onclick="next()">Maybe</button><button class="btn" onclick="next()">No</button>`,
()=>`<h1>Elli...</h1><img id="finalgif" src="${GIF.movie}" onclick="secret()"><div id="ending"></div><p class="small">Click the GIF 5 times...</p>`
];

let s=0, secretClicks=0;
function ach(t){const a=document.getElementById('achievement');a.innerHTML='🏆 '+t;a.style.display='block';setTimeout(()=>a.style.display='none',2500);}
function render(){
 app.innerHTML=screens[s]();
 bar.style.width=(s/(screens.length-1))*100+'%';
 if(s===0) bootText();
 if(s===10) endingText();
}
function bootText(){
 let lines=['Initializing...','Scanning for Elli...','Elli detected ❤️','Mission authorized.'];
 let i=0; const el=document.getElementById('boot'); el.innerHTML='';
 const t=setInterval(()=>{ if(i<lines.length){el.innerHTML+=lines[i]+'<br>';i++;} else clearInterval(t); },700);
}
function endingText(){
 const lines=[
 'Thank you for making it this far.',
 'This GIF is from a movie we watched together.',
 'So it felt like the right way to end this.',
 'Even though you are a stinker...',
 'You are a sweetie du.',
 'And I am always on your side.',
 '❤️ — Adil'
 ];
 let i=0; const el=document.getElementById('ending');
 const t=setInterval(()=>{ if(i<lines.length){el.innerHTML+=`<p>${lines[i]}</p>`;i++;} else clearInterval(t);},1200);
}
function begin(){document.getElementById('music').play().catch(()=>{});ach('Mission Started');next();}
function next(){if(s<screens.length-1)s++; render(); closeOverlay();}
function gif(url,msg,awardName=''){
 if(awardName) ach(awardName);
 overlay.style.display='flex';
 overlayCard.innerHTML=`<img src="${url}"><p>${msg}</p><button class="btn" onclick="next()">Continue</button>`;
}
function dual(a,b){
 overlay.style.display='flex';
 overlayCard.innerHTML=`<img src="${a}"><br><img src="${b}"><p>Analysis complete.</p><button class="btn" onclick="next()">Continue</button>`;
}
function closeOverlay(){overlay.style.display='none';}
function secret(){
 secretClicks++;
 if(secretClicks>=5){
   ach('Secret Elli Ending Found');
   overlay.style.display='flex';
   overlayCard.innerHTML='<h2>🎆 Secret Ending</h2><p>Unlimited Cool Person Status ❤️</p><p>Elli has unlocked legendary status.</p><button class="btn" onclick="closeOverlay()">Awesome</button>';
 }
}
render();
</script>
</body>
</html>
