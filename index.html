<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Operation: Elli Ultimate Final Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Outfit,sans-serif;background:linear-gradient(135deg,#070b16,#1a1038,#111827);color:#fff;background-size:400% 400%;animation:bg 12s ease infinite}@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container{max-width:900px;margin:40px auto;padding:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(14px);padding:28px;border-radius:24px;text-align:center;animation:fade .5s}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
button{margin:8px;padding:14px 20px;border:none;border-radius:14px;background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff;font-weight:700;cursor:pointer;transition:.25s}button:hover{transform:translateY(-2px) scale(1.03)}
img{max-width:100%;border-radius:16px}
.progress{position:fixed;top:0;left:0;right:0;height:8px;background:#222}
.fill{height:100%;width:0;background:linear-gradient(90deg,#ec4899,#8b5cf6,#22d3ee)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);align-items:center;justify-content:center;padding:20px}
#overlay .card{max-width:700px}
#achievement{position:fixed;right:20px;top:20px;background:#fbbf24;color:#111;padding:12px 18px;border-radius:12px;display:none;font-weight:bold}
</style>
</head>
<body>
<div class="progress"><div class="fill" id="fill"></div></div>
<div id="achievement"></div>
<audio id="music" loop><source src="music.mp3" type="audio/mpeg"></audio>
<div class="container"><div id="app"></div></div>
<div id="overlay"><div class="card" id="overlayCard"></div></div>

<script>
const G={
rizz:"https://media1.tenor.com/m/7HdRz8jCFVoAAAAd/dob-dob-dob-rizz.gif",
poop:"https://media1.tenor.com/m/rHb2ijF_nt0AAAAC/call-of-doodoo-advanced-poo-poo.gif",
zyzz:"https://media1.tenor.com/m/TsNQm6dVq0MAAAAd/zyzz-glasses-zyzz.gif",
grat:"https://media.tenor.com/FkrIfYoakDwAAAAi/thanking-gratitude.gif",
caseoh:"https://media1.tenor.com/m/PYeZeMhYu8AAAAAd/caseoh-case.gif",
cry:"https://media1.tenor.com/m/wknZD3HfmWIAAAAC/cry.gif",
identity:"https://media1.tenor.com/m/B8ra2i-OK9QAAAAd/face-recognition.gif",
confused:"https://media1.tenor.com/m/R7tRhSEXLLAAAAAd/idk-rock1.gif",
fbi:"https://media1.tenor.com/m/BuUbqBxHEPUAAAAd/james-doakes-james.gif",
norizz:"https://media1.tenor.com/m/Zu0eXWpX8qsAAAAd/mindy-angry-mindy.gif",
danger:"https://media1.tenor.com/m/9Baue_rQfBcAAAAd/period.gif",
awin:"https://media1.tenor.com/m/bWkE0Y8JaBgAAAAC/dragon-ball-super-saiyan.gif",
gwin:"https://media1.tenor.com/m/RivFq3cEeEwAAAAC/eating-gorilla.gif",
help:"https://media1.tenor.com/m/UlEihqD11CoAAAAd/cat-kiss.gif",
laugh:"https://media1.tenor.com/m/xayHMPdWnmIAAAAC/cat-attack-attitude.gif",
record:"https://media1.tenor.com/m/6Noh04TN-gIAAAAC/prempdr-fc-mobile.gif",
elli:"https://media1.tenor.com/m/psDvH46tqbsAAAAd/fortnite-black-knight.gif",
maybe:"https://media1.tenor.com/m/S8FsdEh6C8kAAAAd/nathan-fielder-nathan-for-you.gif",
hug:"https://media1.tenor.com/m/kzSsY9IxkisAAAAC/npc-behavior-be-like.gif",
cat:"https://media1.tenor.com/m/_hUq1BSUsiMAAAAC/cat-cute.gif",
movie:"https://media1.tenor.com/m/rGMQZtqfK7wAAAAC/dance-swag.gif",
fire:"https://media1.tenor.com/m/mPV5imQtw5UAAAAd/firework-car.gif"
};

const screens=[
["🎮 Operation: Elli","✨ Recommended: turn on the music for the full experience.","<button onclick='startMission()'>🎵 Start Mission</button>"],
["🚨 Government Identity Verification Protocol","Multiple systems are attempting to confirm your identity.","<button onclick=\"showGif(G.identity,'Identity Confirmed','Certified Elli Detector')\">Definitely Elli</button><button onclick=\"showGif(G.confused,'Verification complicated')\">Maybe</button><button onclick=\"showGif(G.fbi,'Suspicious response detected')\">Depends who is asking</button>"],
["☣️ Emergency Adil Odour Investigation","Several scientists have been hospitalised. Please answer honestly.","<button onclick=\"showGif(G.rizz,'Science agrees','Smell Scientist')\">Smells beautiful</button><button onclick=\"showGif(G.poop,'Laboratory devastated')\">Stinks like poop</button>"],
["📏 Department of Chonk Measurement","Please select the closest known body type.","<button onclick=\"showDouble(G.zyzz,G.grat)\">Zyzz</button><button onclick=\"showDouble(G.caseoh,G.cry)\">CaseOh</button>"],
["🚔 International Rizz Monitoring Agency","Authorities need your testimony.<br><strong>What is Adil's current rizz level?</strong>","<button onclick=\"showGif(G.norizz,'Brutal assessment received')\">No rizz</button><button onclick=\"showGif(G.rizz,'Acceptable levels detected')\">Some rizz</button><button onclick=\"showGif(G.danger,'Authorities notified','Dangerous Rizz Detected')\">Dangerous levels</button>"],
["🦍 Supreme Gorilla Court Hearing","The fate of humanity depends on this answer.","<button onclick=\"showGif(G.awin,'Scientists investigating','Gorilla Strategist')\">Adil wins</button><button onclick=\"showGif(G.gwin,'Realistic outcome selected')\">100 Gorillas win</button>"],
["📹 CCTV Footage Review Committee","Adil has fallen. Witness statements are required.","<button onclick=\"showGif(G.help,'Humanity restored')\">Help immediately</button><button onclick=\"showGif(G.laugh,'Fair enough')\">Laugh then help</button><button onclick=\"showGif(G.record,'Evidence secured')\">Record it first</button>"],
["⭐ Global Elli Excellence Commission","Scores below 10/10 have been removed for safety reasons.","<button onclick=\"showGif(G.elli,'Correct answer','Maximum Elli Rating Detected')\">10/10</button><button onclick=\"showGif(G.elli,'Also correct')\">11/10</button><button onclick=\"showGif(G.elli,'Maximum score exceeded')\">12/10</button>"],
["📱 Extremely Important Diplomatic Decision","Please choose carefully. The future is watching.<br><strong>Will you reach out to Adil?</strong>","<button onclick=\"showGif(G.cat,'YAY ❤️')\">Yes</button><button onclick=\"showGif(G.maybe,'We will take that')\">Maybe</button><button onclick=\"showGif(G.hug,'That is okay ❤️')\">No</button>"],
["❤️ Mission Debrief","","<img src='"+G.movie+"' onclick='secret()'><div id='msg'></div><p><b>👀 There may be something hidden if you investigate the GIF...</p>"]
];

let step=0, clicks=0;
function render(){
fill.style.width=(step/(screens.length-1))*100+'%';
app.innerHTML=`<div class="card"><h1>${screens[step][0]}</h1><p>${screens[step][1]}</p>${screens[step][2]}</div>`;
if(step===9) typeMessage();
}
function startMission(){music.play().catch(()=>{}); next();}
function next(){step++; overlay.style.display='none'; render();}
function achievement(t){achievementEl=document.getElementById('achievement');achievementEl.textContent='🏆 '+t;achievementEl.style.display='block';setTimeout(()=>achievementEl.style.display='none',2500);}
function showGif(url,msg,ach=''){if(ach)achievement(ach);overlay.style.display='flex';overlayCard.innerHTML=`<img src="${url}"><p>${msg}</p><button onclick="next()">Continue</button>`;}
function showDouble(a,b){overlay.style.display='flex';overlayCard.innerHTML=`<img src="${a}"><br><img src="${b}"><br><button onclick="next()">Continue</button>`;}
function typeMessage(){
const lines=["Elli...","Thank you for making it this far.","","Even though you are a stinker...","You are a sweetie du.","And I'm always on your side.","❤️ — Adil"];
let i=0; msg.innerHTML='';
const t=setInterval(()=>{ if(i<lines.length){msg.innerHTML += '<p>'+lines[i]+'</p>'; i++;} else clearInterval(t); },900);
}
function secret(){
clicks++;
if(clicks>=5){
overlay.style.display='flex';
overlayCard.innerHTML=`<img src="${G.fire}"><h2>🎆 Secret Ending Unlocked</h2><p>Unlimited Cool Person Status ❤️</p><button onclick="overlay.style.display='none'">Awesome</button>`;
}
}
render();
</script>
</body></html>
